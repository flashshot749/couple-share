/* 全局动画 */
/* ============================================================ */

/* 缓慢弹跳动画（用于Logo心形） */
@keyframes bounce-slow {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.animate-bounce-slow {
  animation: bounce-slow 2s ease-in-out infinite;
}

/* 底部滑入动画（用于弹窗） */
@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.animate-slide-up {
  animation: slide-up 0.3s ease-out;
}

/* 淡入动画 */
@keyframes fade-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fade-in {
  animation: fade-in 0.3s ease-out;
}

/* ============================================================ */
/* Toast 提示 */
/* ============================================================ */

#toast.show {
  display: block !important;
  opacity: 1 !important;
}

/* ============================================================ */

  color: #4a4a4a;

  position: relative;
}

.calendar-day:hover {

}

.calendar-day.today {
  background-color: #fce8e8;
  color: #d46363;
  font-weight: 700;
}

.calendar-day.selected {
  background-color: #d46363;
  color: white;
  font-weight: 700;
}

.calendar-day.other-month {
  color: #d0d0d0;
  cursor: default;
}

.calendar-day.other-month:hover {
  background-color: transparent;
}

/* 有待办事项的日期小圆点 */
.calendar-day.has-todos::after {
  content: '';
  position: absolute;
  bottom: 2px;
  width: 5px;
  height: 5px;

.calendar-day.selected.has-todos::after {

<script>

const SB_KEY = 'sb_publishable_v4dv4jq4F9EzfD09wBBrsw_jrPcyCAg';
const SB_H = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
async function sbReq(url, opts={}) {
  const res = await fetch(url, { headers: SB_H, ...opts });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||'请求失败'); }
  return res;
}
function sbQuery(table) {
  let url = `${SB_URL}/${table}`, params = [], m = 'GET', body = null, isSingle = false;
  const chain = {
    select: (cols) => { params.push('select=' + (cols||'*')); return chain; },
    eq: (k, v) => { params.push(`${k}=eq.${encodeURIComponent(v)}`); return chain; },
    gte: (k, v) => { params.push(`${k}=gte.${encodeURIComponent(v)}`); return chain; },
    lte: (k, v) => { params.push(`${k}=lte.${encodeURIComponent(v)}`); return chain; },
    order: (col, opts) => { params.push(`order=${col}.${opts&&opts.ascending===false?'desc':'asc'}`); return chain; },
    single: () => { isSingle = true; params.push('limit=1'); return chain; },
    insert: (obj, opts) => { m='POST'; body=JSON.stringify(Array.isArray(obj)?obj:(opts?.default??true?[obj]:obj)); return chain; },
    update: (obj) => { m='PATCH'; body=JSON.stringify(obj); return chain; },
    delete: () => { m='DELETE'; return chain; },
    then: (resolve, reject) => {
      (async () => {
        try {
          const u = url + (params.length ? '?' + params.join('&') : '');
          const res = await sbReq(u, { method: m, body });
          if (m==='DELETE') { resolve(res.ok); return; }
          const data = await res.json();
          resolve(isSingle ? { data: data[0]||null } : { data });
        } catch(e) { reject(e); }
      })();
    }
  };
  return chain;
}

async function sha256(m) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m)); return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join(''); }
function toast(m) { const t=document.getElementById('toast'),e=document.getElementById('toast-msg'); e.textContent=m; t.classList.remove('hidden'); t.style.opacity=1; setTimeout(()=>{t.style.opacity=0;setTimeout(()=>t.classList.add('hidden'),300)},2000); }

// ========== 认证 ==========
async function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value.trim();
  const err = document.getElementById('login-error');
  if (!u || !p) { err.textContent='请输入账号和密码'; err.classList.remove('hidden'); return; }
  const btn = document.getElementById('login-btn'); btn.disabled=true; btn.textContent='登录中...'; err.classList.add('hidden');
  try {
    const { data } = await SB.from('users').select('*').eq('username', u).single();
    if (!data) throw new Error('账号不存在');
    if (data.password_hash !== await sha256(p)) throw new Error('密码错误');
    currentUser = data;
    localStorage.setItem('cu_user', JSON.stringify({id:data.id, username:data.username, display_name:data.display_name}));
    showApp();
    toast('欢迎回来，'+data.display_name+' 💕');
  } catch(e) { err.textContent=e.message; err.classList.remove('hidden'); }
  finally { btn.disabled=false; btn.textContent='进入我们的空间'; }
}

function doLogout() { if(confirm('确定退出？')){ currentUser=null; localStorage.removeItem('cu_user'); showLogin(); } }

async function checkSession() {
  const saved = localStorage.getItem('cu_user');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      const { data } = await SB.from('users').select('*').eq('id', u.id).single();
      if (data) { currentUser = data; showApp(); return; }
    } catch(e) {}
  }
  showLogin();
}

function showLogin() { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('app-screen').classList.add('hidden'); }
function showApp() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); document.getElementById('header-greeting').textContent='Hi, '+currentUser.display_name; loadUserMap(); switchPage('home'); }

async function loadUserMap() {
  const { data } = await SB.from('users').select('id,display_name');
  if (data) data.forEach(u => userMap[u.id] = u.display_name);
}

// ========== 页面切换 ==========
async function switchPage(p) {
  currentPage = p;
  document.querySelectorAll('#page-home,#page-bills,#page-calendar').forEach(e=>e.classList.add('hidden'));
  document.getElementById('page-'+p).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.querySelector('span:last-child').classList.remove('text-love-500','font-semibold');b.querySelector('span:last-child').classList.add('text-gray-400');});
  const nb = document.getElementById('nav-'+p);
  nb.classList.add('active'); nb.querySelector('span:last-child').classList.remove('text-gray-400'); nb.querySelector('span:last-child').classList.add('text-love-500','font-semibold');
  if (p==='home') { loadQuote(); loadTodayTodos(); loadStats(); }
  else if (p==='bills') loadBills();
  else if (p==='calendar') renderCal();
}

// ========== 待办 ==========
async function loadTodayTodos() {
  const d = today();
  document.getElementById('today-date-display').textContent = d;
  try {
    const { data } = await SB.from('todos').select('*').eq('todo_date', d).order('completed').order('created_at', {ascending: false});
    renderTodos('today-todos-list', data||[], d);
  } catch(e) {}
}

function renderTodos(containerId, todos, date) {
  const c = document.getElementById(containerId);
  if (!todos.length) { c.innerHTML='<div class="text-center py-6"><div class="text-3xl mb-2">✨</div><p class="text-gray-400 text-sm">还没有待办事项</p></div>'; return; }
  c.innerHTML = todos.map(t => `
    <div class="todo-item ${t.completed?'todo-completed':''} flex items-center gap-3 p-2 rounded-xl hover:bg-love-50 transition-colors group">
      <button onclick="toggleTodo(${t.id},'${date}')" class="text-xl flex-shrink-0 hover:scale-110 transition-transform">${t.completed?'✅':'⬜'}</button>
      <div class="flex-1 min-w-0"><p class="todo-text text-sm text-gray-700 truncate">${esc(t.description)}</p><p class="text-xs text-gray-400">${esc(userMap[t.created_by]||'')} 添加${t.completed?(' · '+esc(userMap[t.completed_by]||'')+' 完成'):''}</p></div>
      <button onclick="deleteTodo(${t.id},'${date}')" class="text-gray-300 hover:text-red-400 transition-colors text-sm opacity-0 group-hover:opacity-100 flex-shrink-0">🗑</button>
    </div>`).join('');
}

async function addQuickTodo() {
  const inp = document.getElementById('quick-todo-input');
  const desc = inp.value.trim();
  if (!desc) return toast('请输入待办内容');
  const d = today();
  await SB.from('todos').insert({description:desc, todo_date:d, created_by:currentUser.id});
  inp.value='';
  toast('已添加 ✅');
  loadTodayTodos();
}

async function toggleTodo(id, date) {
  const { data } = await SB.from('todos').select('completed').eq('id', id).single();
  await SB.from('todos').update({completed: data.completed?0:1, completed_by: data.completed?null:currentUser.id}).eq('id', id);
  loadTodayTodos();
  if (date===calSelected) loadCalTodos(date);
}

async function deleteTodo(id, date) {
  if (!confirm('确定删除？')) return;
  await SB.from('todos').delete().eq('id', id);
  loadTodayTodos();
  if (date===calSelected) loadCalTodos(date);
  toast('已删除');
}

// ========== 日历 ==========
function renderCal() {
  document.getElementById('calendar-month-title').textContent = calYear+'年 '+calMonth+'月';
  const grid = document.getElementById('calendar-grid');
  const firstDay = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const prevDays = new Date(calYear, calMonth-1, 0).getDate();
  let html = '';
  for (let i=0; i<firstDay; i++) html += `<div class="calendar-day other-month">${prevDays-firstDay+i+1}</div>`;
  const t = today();
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'calendar-day';
    if (ds===t) cls+=' today';
    if (ds===calSelected) cls+=' selected';
    html += `<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  const total = firstDay+daysInMonth;
  const rem = total%7?7-total%7:0;
  for (let d=1; d<=rem; d++) html += `<div class="calendar-day other-month">${d}</div>`;
  grid.innerHTML = html;
  loadCalTodos(calSelected);
}

function prevMonth() { if(calMonth===1){calMonth=12;calYear--}else calMonth--; renderCal(); }
function nextMonth() { if(calMonth===12){calMonth=1;calYear++}else calMonth++; renderCal(); }

function selectDate(ds) {
  calSelected = ds;
  document.getElementById('cal-date-label').textContent = ds;
  renderCal();
}

async function loadCalTodos(date) {
  const cnt = document.getElementById('cal-todo-count');
  const list = document.getElementById('cal-todos-list');
  try {
    const { data } = await SB.from('todos').select('*'*').eq('todo_date', date).order('completed').order('created_at', {ascending: false});
    cnt.textContent = (data||[]).length+' 项 · 完成 '+(data||[]).filter(t=>t.completed).length;
    renderTodos('cal-todos-list', data||[], date);
  } catch(e) {}
}

async function addCalTodo() {
  const desc = document.getElementById('cal-todo-input').value.trim();
  if (!desc) return toast('请输入待办内容');
  await SB.from('todos').insert({description:desc, todo_date:calSelected, created_by:currentUser.id});
  document.getElementById('cal-todo-input').value='';
  toast('已添加 ✅');
  loadCalTodos(calSelected);
  if (calSelected===today()) loadTodayTodos();
}

// ========== 记账 ==========
function updateTypeBtn() {
  const e=document.getElementById('bill-type-expense'), i=document.getElementById('bill-type-income');
  if(billType==='expense'){e.className='flex-1 py-3 rounded-xl border-2 border-love-300 bg-love-50 text-love-600 font-semibold transition-all';i.className='flex-1 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 text-gray-500 transition-all';}
  else{i.className='flex-1 py-3 rounded-xl border-2 border-green-300 bg-green-50 text-green-600 font-semibold transition-all';e.className='flex-1 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 text-gray-500 transition-all';}
}

function showBillModal(bill) {
  editingBillId = bill?bill.id:null;
  billType = bill?bill.type:'expense';
  document.getElementById('bill-modal-title').textContent = bill?'✏️ 编辑账单':'✏️ 记一笔';
  document.getElementById('bill-amount').value = bill?bill.amount:'';
  document.getElementById('bill-desc').value = bill?bill.description:'';
  document.getElementById('bill-date').value = bill?bill.bill_date:today();
  document.getElementById('bill-delete-btn').classList.toggle('hidden', !bill);
  updateTypeBtn();
  document.getElementById('bill-modal').classList.remove('hidden');
}

function closeBillModal() { document.getElementById('bill-modal').classList.add('hidden'); editingBillId=null; }

async function submitBill() {
  const amount = parseFloat(document.getElementById('bill-amount').value);
  const desc = document.getElementById('bill-desc').value.trim();
  const bd = document.getElementById('bill-date').value;
  if (!amount || amount<=0) return toast('请输入有效金额');
  if (!bd) return toast('请选择日期');
  try {
    if (editingBillId) {
      const { error } = await SB.from('bills').update({type:billType, amount, description:desc, bill_date:bd}).eq('id', editingBillId).eq('user_id', currentUser.id);
      if (error) throw error;
      toast('已更新 ✅');
    } else {
      await SB.from('bills').insert({user_id:currentUser.id, type:billType, amount, description:desc, bill_date:bd});
      toast('记账成功 💰');
    }
    closeBillModal();
    loadBills();
    loadStats();
  } catch(e) { toast(e.message||'操作失败'); }
}

async function deleteCurrentBill() {
  if (!editingBillId || !confirm('确定删除？')) return;
  await SB.from('bills').delete().eq('id', editingBillId).eq('user_id', currentUser.id);
  closeBillModal();
  loadBills();
  loadStats();
  toast('已删除');
}

async function loadBills() {
  const mf = document.getElementById('bill-month-filter').value;
  let query = SB.from('bills').select('*, user_id').order('bill_date', {ascending: false}).order('created_at', {ascending: false});
  if (mf) {
    const [y,m] = mf.split('-');
    query = query.gte('bill_date', `${y}-${m}-01`).lte('bill_date', `${y}-${m}-31`);
  }
  const { data } = await query;
  const list = document.getElementById('bills-list');
  if (!data || !data.length) { list.innerHTML='<div class="text-center py-10"><div class="text-5xl mb-3">📭</div><p class="text-gray-400 text-sm">还没有账单记录</p></div>'; renderBillStats([]); return; }

  // 按日期分组
  const grouped = {};
  data.forEach(b => { if(!grouped[b.bill_date]) grouped[b.bill_date]=[]; grouped[b.bill_date].push(b); });
  let html = '';
  const todayDate = today();
  for (const [date, bills] of Object.entries(grouped)) {
    const d = new Date(date);
    const wd = ['日','一','二','三','四','五','六'][d.getDay()];
    html += `<div class="mb-1"><span class="text-xs text-gray-400 font-medium">📅 ${d.getMonth()+1}月${d.getDate()}日 周${wd}</span></div>`;
    bills.forEach(b => {
      const mine = b.user_id === currentUser.id;
      const sign = b.type==='expense'?'-':'+';
      const ac = b.type==='expense'?'text-red-400':'text-green-500';
      const icon = b.type==='expense'?'💸':'💰';
      html += `<div class="bg-white rounded-xl p-3 mb-2 shadow-sm border border-love-50 ${mine?'':'border-l-2 border-l-love-200'}">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2 flex-1 min-w-0"><span class="text-lg">${icon}</span><div class="min-w-0"><p class="text-sm text-gray-700 truncate">${esc(b.description)||(b.type==='expense'?'支出':'收入')}</p><p class="text-xs text-gray-400">${esc(userMap[b.user_id]||'')}</p></div></div>
          <div class="text-right ml-3"><p class="font-semibold ${ac}">${sign}¥${b.amount.toFixed(2)}</p>${mine?`<button onclick='showBillModal(${JSON.stringify(b)})' class="text-xs text-love-400 hover:text-love-600 mt-0.5">编辑</button>`:'<span class="text-xs text-gray-300">对方</span>'}</div>
        </div></div>`;
    });
  }
  list.innerHTML = html;
  renderBillStats(data);
}

function renderBillStats(bills) {
  const c = document.getElementById('bills-month-stats');
  if (!bills.length) { c.innerHTML='<span class="text-gray-400">暂无账单</span>'; return; }
  let ex=0,inc=0; bills.forEach(b=>{if(b.type==='expense')ex+=b.amount;else inc+=b.amount;});
  c.innerHTML=`<span class="text-red-400">💸 支出 ${fmt(ex)}</span><span class="text-gray-300">|</span><span class="text-green-500">💰 收入 ${fmt(inc)}</span><span class="text-gray-300">|</span><span class="text-gray-500">结余 ${fmt(inc-ex)}</span>`;
}

async function loadStats() {
  const td = today();
  const now = new Date();
  const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const me = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(new Date(now.getFullYear(),now.getMonth()+1,0).getDate()).padStart(2,'0')}`;
  const ys = `${now.getFullYear()}-01-01`;
  const ye = `${now.getFullYear()}-12-31`;

  const stats = async (start, end, uid) => {
    let ex = SB.from('bills').select('amount').eq('type','expense').gte('bill_date',start).lte('bill_date',end);
    let inc = SB.from('bills').select('amount').eq('type','income').gte('bill_date',start).lte('bill_date',end);
    if (uid) { ex = ex.eq('user_id',uid); inc = inc.eq('user_id',uid); }
    const [er, ir] = await Promise.all([ex, inc]);
    return { expense: (er.data||[]).reduce((s,r)=>s+r.amount,0), income: (ir.data||[]).reduce((s,r)=>s+r.amount,0) };
  };

  const [md, ad] = await Promise.all([stats(td,td,currentUser.id), stats(td,td)]);
  document.getElementById('my-today-expense').textContent=fmt(md.expense); document.getElementById('my-today-income').textContent=fmt(md.income);
  document.getElementById('all-today-expense').textContent=fmt(ad.expense); document.getElementById('all-today-income').textContent=fmt(ad.income);

  const [mm, am] = await Promise.all([stats(ms,me,currentUser.id), stats(ms,me)]);
  document.getElementById('my-month-expense').textContent=fmt(mm.expense); document.getElementById('my-month-income').textContent=fmt(mm.income);
  document.getElementById('all-month-expense').textContent=fmt(am.expense); document.getElementById('all-month-income').textContent=fmt(am.income);

  const [my, ay] = await Promise.all([stats(ys,ye,currentUser.id), stats(ys,ye)]);
  document.getElementById('my-year-expense').textContent=fmt(my.expense); document.getElementById('my-year-income').textContent=fmt(my.income);
  document.getElementById('all-year-expense').textContent=fmt(ay.expense); document.getElementById('all-year-income').textContent=fmt(ay.income);
}

// ========== 改密码 ==========
function showPwdModal() { document.getElementById('pwd-modal').classList.remove('hidden'); document.getElementById('pwd-msg').classList.add('hidden'); document.getElementById('pwd-old').value=''; document.getElementById('pwd-new').value=''; }
function closePwdModal() { document.getElementById('pwd-modal').classList.add('hidden'); }
async function changePwd() {
  const old = document.getElementById('pwd-old').value.trim();
  const neu = document.getElementById('pwd-new').value.trim();
  const msg = document.getElementById('pwd-msg');
  msg.classList.remove('hidden');
  if (!old||!neu) { msg.textContent='请填写完整'; msg.className='text-xs text-center mt-2 text-red-400'; return; }
  if (neu.length<6) { msg.textContent='新密码至少6位'; msg.className='text-xs text-center mt-2 text-red-400'; return; }
  if (currentUser.password_hash !== await sha256(old)) { msg.textContent='原密码错误'; msg.className='text-xs text-center mt-2 text-red-400'; return; }
  await SB.from('users').update({password_hash: await sha256(neu)}).eq('id', currentUser.id);
  currentUser.password_hash = await sha256(neu);
  msg.textContent='✅ 密码修改成功！'; msg.className='text-xs text-center mt-2 text-green-500';
}
